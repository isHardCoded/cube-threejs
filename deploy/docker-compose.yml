# Production stack for the VPS: game server + Postgres + Caddy (auto-TLS).
# Usage: set SERVER_HOST in .env (e.g. 1-2-3-4.sslip.io), then `docker compose up -d`.
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SERVER_HOST: ${SERVER_HOST}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - game

  game:
    build: ../server
    restart: unless-stopped
    environment:
      ADDR: ":8090"
      DATABASE_URL: postgres://cube:${POSTGRES_PASSWORD}@postgres:5432/cube2077
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cube
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cube2077
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cube -d cube2077"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  caddy_data:
  caddy_config:

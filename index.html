<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CUBE 2077</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: none;
            background: #07030f;
            font-family: 'Segoe UI', Rajdhani, Verdana, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        canvas.webgl {
            position: fixed;
            top: 0;
            left: 0;
            outline: none;
            display: block;
        }
        .hud {
            position: fixed;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-transform: uppercase;
        }
        .hud--title {
            top: calc(18px + env(safe-area-inset-top));
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 8px;
            color: #fcee0a;
            text-shadow:
                0 0 6px rgba(252, 238, 10, .9),
                0 0 24px rgba(252, 238, 10, .5),
                2px 2px 0 rgba(255, 42, 109, .55);
            animation: flicker 6s infinite;
        }
        .hud--title span {
            color: #00f0ff;
            text-shadow:
                0 0 6px rgba(0, 240, 255, .9),
                0 0 24px rgba(0, 240, 255, .5),
                -2px 2px 0 rgba(255, 42, 109, .55);
        }
        .hud--hint {
            bottom: calc(22px + env(safe-area-inset-bottom));
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2.5px;
            color: #00f0ff;
            text-shadow: 0 0 8px rgba(0, 240, 255, .8);
            opacity: .85;
            transition: opacity 1.2s ease;
        }
        .hud--hint.faded { opacity: 0; }
        .hud--status {
            top: calc(58px + env(safe-area-inset-top));
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #ff2a6d;
            text-shadow: 0 0 10px rgba(255, 42, 109, .9);
            animation: flicker 2s infinite;
        }
        .hud--status.hidden { display: none; }
        .hud--timer {
            top: calc(84px + env(safe-area-inset-top));
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2.5px;
            color: #00f0ff;
            text-shadow: 0 0 8px rgba(0, 240, 255, .7);
        }
        .hud--timer.danger {
            color: #ff2a6d;
            text-shadow: 0 0 12px rgba(255, 42, 109, .95);
            animation: pulse .7s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .45; }
        }
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: .4; }
            94% { opacity: 1; }
            96% { opacity: .6; }
            97% { opacity: 1; }
        }
        .daybtn {
            position: fixed;
            top: calc(16px + env(safe-area-inset-top));
            right: calc(16px + env(safe-area-inset-right));
            z-index: 20;
            padding: 8px 14px;
            font: 700 12px 'Segoe UI', Verdana, sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00f0ff;
            background: rgba(5, 5, 18, .65);
            border: 1px solid rgba(0, 240, 255, .55);
            border-radius: 4px;
            cursor: pointer;
            text-shadow: 0 0 8px rgba(0, 240, 255, .8);
        }
        .daybtn:hover { background: rgba(0, 240, 255, .12); }
        .login {
            position: fixed;
            inset: 0;
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            background: rgba(4, 2, 12, .88);
            backdrop-filter: blur(6px);
        }
        .login.hidden { display: none; }
        .login__title {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: #fcee0a;
            text-shadow: 0 0 8px rgba(252, 238, 10, .9), 0 0 28px rgba(252, 238, 10, .5);
        }
        .login__title span { color: #00f0ff; text-shadow: 0 0 8px rgba(0, 240, 255, .9); }
        .login__label {
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(0, 240, 255, .8);
        }
        .login__input {
            width: min(300px, 78vw);
            padding: 13px 16px;
            font: 700 18px 'Segoe UI', Verdana, sans-serif;
            letter-spacing: 2px;
            text-align: center;
            color: #fff;
            background: rgba(10, 10, 26, .9);
            border: 1px solid rgba(0, 240, 255, .6);
            border-radius: 4px;
            outline: none;
            text-transform: uppercase;
        }
        .login__input:focus { border-color: #fcee0a; box-shadow: 0 0 14px rgba(252, 238, 10, .35); }
        .login__btn {
            width: min(300px, 78vw);
            padding: 13px 16px;
            font: 800 16px 'Segoe UI', Verdana, sans-serif;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #07030f;
            background: #fcee0a;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 0 18px rgba(252, 238, 10, .5);
        }
        .login__btn:hover { box-shadow: 0 0 28px rgba(252, 238, 10, .8); }
    </style>
</head>
<body>
    <canvas class="webgl"></canvas>
    <div class="hud hud--title">CUBE&nbsp;<span>2077</span></div>
    <div class="hud hud--status hidden" id="status"></div>
    <div class="hud hud--timer" id="timer"></div>
    <div class="hud hud--hint" id="hint">WASD&nbsp;·&nbsp;свайп&nbsp;·&nbsp;двойное&nbsp;нажатие&nbsp;=&nbsp;рывок&nbsp;·&nbsp;пробел&nbsp;=&nbsp;прыжок</div>
    <button class="daybtn" id="daybtn" type="button">ДЕНЬ</button>
    <div class="login" id="login">
        <div class="login__title">CUBE&nbsp;<span>2077</span></div>
        <div class="login__label">Введи никнейм</div>
        <input class="login__input" id="nick" maxlength="14" autocomplete="off" spellcheck="false" placeholder="NICKNAME">
        <button class="login__btn" id="play" type="button">Играть</button>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CUBE 2077</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: none;
            background: #07030f;
            font-family: 'Segoe UI', Rajdhani, Verdana, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        canvas.webgl {
            position: fixed;
            top: 0;
            left: 0;
            outline: none;
            display: block;
        }
        .hud {
            position: fixed;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-transform: uppercase;
        }
        .hud--title {
            top: calc(18px + env(safe-area-inset-top));
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 8px;
            color: #fcee0a;
            text-shadow:
                0 0 6px rgba(252, 238, 10, .9),
                0 0 24px rgba(252, 238, 10, .5),
                2px 2px 0 rgba(255, 42, 109, .55);
            animation: flicker 6s infinite;
        }
        .hud--title span {
            color: #00f0ff;
            text-shadow:
                0 0 6px rgba(0, 240, 255, .9),
                0 0 24px rgba(0, 240, 255, .5),
                -2px 2px 0 rgba(255, 42, 109, .55);
        }
        .hud--hint {
            bottom: calc(22px + env(safe-area-inset-bottom));
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2.5px;
            color: #00f0ff;
            text-shadow: 0 0 8px rgba(0, 240, 255, .8);
            opacity: .85;
            transition: opacity 1.2s ease;
        }
        .hud--hint.faded { opacity: 0; }
        .hud--status {
            top: calc(58px + env(safe-area-inset-top));
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #ff2a6d;
            text-shadow: 0 0 10px rgba(255, 42, 109, .9);
            animation: flicker 2s infinite;
        }
        .hud--status.hidden { display: none; }
        .panel {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            bottom: calc(48px + env(safe-area-inset-bottom));
            width: min(300px, 70vw);
            pointer-events: none;
            z-index: 10;
        }
        .bar {
            position: relative;
            height: 16px;
            background: rgba(5, 5, 12, .75);
            border: 1px solid rgba(0, 240, 255, .55);
            box-shadow: 0 0 10px rgba(0, 240, 255, .25);
            margin-bottom: 6px;
            overflow: hidden;
        }
        .bar__fill {
            height: 100%;
            width: 100%;
            background: #39ff14;
            transition: width .18s ease, background .3s ease;
        }
        .bar__label {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 4px #000, 0 0 4px #000;
        }
        .bar--dash { height: 8px; border-color: rgba(252, 238, 10, .55); box-shadow: 0 0 10px rgba(252, 238, 10, .2); }
        .bar--dash .bar__fill { background: #fcee0a; transition: none; }
        .bar--dash.denied { border-color: #ff2a6d; box-shadow: 0 0 14px rgba(255, 42, 109, .8); }
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: .4; }
            94% { opacity: 1; }
            96% { opacity: .6; }
            97% { opacity: 1; }
        }
    </style>
</head>
<body>
    <canvas class="webgl"></canvas>
    <div class="hud hud--title">CUBE&nbsp;<span>2077</span></div>
    <div class="hud hud--status hidden" id="status"></div>
    <div class="hud hud--hint" id="hint">WASD&nbsp;·&nbsp;стрелки&nbsp;·&nbsp;свайп&nbsp;·&nbsp;двойное&nbsp;нажатие&nbsp;=&nbsp;рывок</div>
    <div class="panel">
        <div class="bar">
            <div class="bar__fill" id="hpfill"></div>
            <div class="bar__label" id="hptext">HP 100</div>
        </div>
        <div class="bar bar--dash">
            <div class="bar__fill" id="dashfill"></div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
